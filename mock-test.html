<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mock Test · GJIMT MBA AI LMS</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand"><span>GJIMT MBA AI LMS</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser">Loading...</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <main style="max-width:900px;margin:0 auto;padding:32px 24px;">
    <div class="card">
      <h1 id="mockTitle">Mock Test</h1>
      <p class="text-muted" id="mockMeta">Loading...</p>
      <div class="alert alert-info mt-16">
        40 MCQs · 90 minutes · 65% passing threshold · Use institutional email only.
      </div>
      <p class="mt-16">Replace the button link below with the Google Form URL from your mock test bank configuration.</p>
      <a class="btn btn-primary mt-16" id="openMockBtn" href="#" target="_blank">Open Google Form</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireAuth();
      document.getElementById("topbarUser").textContent = `${user.displayName} · ${user.userId}`;

      const params = new URLSearchParams(location.search);
      const id = params.get("id") || "MT01";
      const meta = await fetch("data/gsdc-modules.json").then(r => r.json());
      const mock = meta.mockTests.find(m => m.id === id);

      if (!mock) return;

      document.getElementById("mockTitle").textContent = mock.title;
      document.getElementById("mockMeta").textContent =
        `${mock.domains.join(", ")} · ${mock.questions} Questions · ${mock.duration} Minutes · Scheduled: ${mock.scheduledDate}`;
      document.getElementById("openMockBtn").href = mock.formUrl;
    });
  </script>
</body>
</html>
