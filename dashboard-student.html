<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Dashboard · GJIMT MBA AI LMS</title>

  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>

  <style>
    /* MOCK GRID */
    .mock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .mock-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      transition: 0.2s;
    }

    .mock-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .mock-card-title { font-weight: 700; }

    .mock-date-chip {
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .domain-tag {
      background: #eff6ff;
      color: #2563eb;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .topics-body { display:none; }
    .topics-body.open { display:block; }

    /* ACTION AREA */
    .mock-actions {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
    }

    .btn-open-test {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      color: #fff;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(37, 99, 235, 0.25);
      transition: 0.25s;
    }

    .btn-open-test:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.35);
    }
  </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <span>GJIMT MBA AI LMS</span>
    <small>Semester 1 · 2026</small>
  </div>
  <div class="topbar-right">
    <span id="topbarUser">Loading...</span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<main class="dash-wrap">

<!-- WELCOME -->
<section class="welcome-banner">
  <div>
    <h2>Welcome, <span id="studentName">Student</span></h2>
    <p>MBA with AI Integration · Shadow Projects + GSDC Prep</p>
  </div>

  <div class="welcome-stats">
    <div class="stat-item"><div id="statProjects">0/4</div><div>Projects</div></div>
    <div class="stat-item"><div id="statModules">0/11</div><div>Modules</div></div>
    <div class="stat-item"><div id="statMocks">0/11</div><div>Mocks</div></div>
    <div class="stat-item"><div id="statAvgScore">—</div><div>Avg Score</div></div>
  </div>
</section>

<!-- PROGRESS -->
<section class="card mb-16">
  <div class="flex-between mb-8">
    <span>Overall Progress</span>
    <span id="overallPct">0%</span>
  </div>
  <div class="progress-bar-wrap">
    <div id="overallBar" style="width:0%"></div>
  </div>
</section>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" data-tab="tabProjects">📁 Projects</button>
  <button class="tab-btn" data-tab="tabGSDC">📚 Modules</button>
  <button class="tab-btn" data-tab="tabMocks">📝 Mock Tests</button>
</div>

<!-- PROJECTS -->
<div id="tabProjects" class="tab-panel active">
  <div class="section-title">Shadow Projects</div>
  <div id="projectsGrid"><div class="spinner"></div></div>
</div>

<!-- MODULES -->
<div id="tabGSDC" class="tab-panel">
  <div class="section-title">GSDC Modules</div>
  <div id="modulesList"><div class="spinner"></div></div>
</div>

<!-- MOCKS -->
<div id="tabMocks" class="tab-panel">
  <div class="section-title">Mock Tests</div>

  <div>
    <b id="smAttempted">0/11</b> Attempted |
    <b id="smPassed">0</b> Passed |
    Avg: <b id="smAvg">—</b> |
    Best: <b id="smBest">—</b>
  </div>

  <div id="mockGrid" class="mock-grid">
    <div class="spinner"></div>
  </div>
</div>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>

<!-- TAB SWITCH -->
<script>
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});
</script>

<!-- MOCK LOGIC -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  loadProjects();
  loadModules();
  
});

/* ===========================
   LOAD PROJECTS
=========================== */
function loadProjects() {
  const container = document.getElementById("projectsGrid");

  const projects = [
    {
      title: "Market Entry Snapshot",
      desc: "Analyse one city or region for expansion"
    },
    {
      title: "Customer Journey Mapping",
      desc: "Map end-to-end customer journey"
    },
    {
      title: "Startup Business Model Study",
      desc: "Analyse revenue model of startup"
    },
    {
      title: "Functional Dashboard Creation",
      desc: "Build KPI dashboard using tools"
    }
  ];

  container.innerHTML = "";

  projects.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <span class="status">Not Started</span>
    `;

    container.appendChild(card);
  });
}

/* ===========================
   LOAD MODULES
=========================== */
function loadModules() {
  fetch("data/gsdc-modules.json")
    .then(res => res.json())
    .then(data => {
      const modules = data.modules;
      const container = document.getElementById("modulesList");

      container.innerHTML = "";

      modules.forEach(m => {
        const div = document.createElement("div");

        div.innerHTML = `
          <div style="padding:10px 0;border-bottom:1px solid #eee">
            <b>${m.title}</b><br>
            ${m.week} · ${m.scheduledDate}<br>
            <span style="color:#64748b">${m.description}</span><br>
            <span style="font-size:12px">Not Started</span>
          </div>
        `;

        container.appendChild(div);
      });
    });
}

/* ===========================
   LOAD MOCKS
=========================== */

/* ===========================
   TOGGLE TOPICS
=========================== */
document.addEventListener("click", e => {
  if (e.target.classList.contains("topics-toggle")) {
    e.target.nextElementSibling.classList.toggle("open");
  }
});
</script>


</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  loadProjects();
  loadModules();
});
</script>
<script src="js/student-dashboard.js"></script>
</body>
</html>
