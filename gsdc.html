<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GSDC Tracker · GJIMT MBA AI LMS</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand"><span>GJIMT MBA AI LMS</span></div>
  <div class="topbar-right">
    <span class="topbar-user" id="topbarUser">Loading...</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<main class="dash-wrap">
  <a class="back-link" href="dashboard-student.html" style="display:inline-block;margin-bottom:20px;color:#64748b;font-size:.82rem;">← Back to Dashboard</a>

  <section class="card mb-24">
    <div class="flex-between mb-8">
      <span class="fw-700">GSDC Certification Progress</span>
      <span class="text-sm text-muted" id="gsdcPct">0/11 complete</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="gsdcBar" style="width:0%"></div>
    </div>
  </section>

  <div class="section-title">11 Weekly Modules (Fridays = Doubt Session)</div>
  <div class="card mb-24" id="moduleWrap"><div class="spinner"></div></div>

  <div class="section-title">Saturday Mock Tests (40 MCQs · 90 Min · 65% Pass = 26/40)</div>
  <div class="card" id="mockWrap"><div class="spinner"></div></div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsdc.js"></script>
</body>
</html>
