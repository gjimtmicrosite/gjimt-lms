<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Faculty Dashboard · GJIMT MBA AI LMS</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand"><span>GJIMT MBA AI LMS</span><small>Faculty View</small></div>
  <div class="topbar-right">
    <span class="topbar-user" id="topbarUser">Loading...</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<main class="dash-wrap">
  <section class="welcome-banner">
    <div>
      <h2>Faculty Dashboard · <span id="facultyName">Faculty</span></h2>
      <p>Complete batch monitoring — 10 MBA students · Semester 1 · 2026</p>
    </div>
    <div class="welcome-stats">
      <div class="stat-item"><div class="val" id="statStudents">0</div><div class="lbl">Students</div></div>
      <div class="stat-item"><div class="val" id="statTotalDone">0</div><div class="lbl">Projects Completed</div></div>
      <div class="stat-item"><div class="val" id="statMocks">0</div><div class="lbl">Mock Attempts</div></div>
      <div class="stat-item"><div class="val" id="statPassed">0</div><div class="lbl">Mocks Passed</div></div>
    </div>
  </section>

  <div class="card mb-16">
    <input id="searchInput" type="text" placeholder="🔍 Search by student name or ID..."
      style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;"/>
  </div>

  <div class="section-title">Batch Progress — All Students</div>
  <div class="card" style="overflow-x:auto;">
    <table class="faculty-table">
      <thead>
        <tr>
          <th>User ID</th><th>Name</th>
          <th>P1</th><th>P2</th><th>P3</th><th>P4</th>
          <th>Done</th><th>Avg Mock</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="facultyTableBody">
        <tr><td colspan="9" style="text-align:center;padding:24px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/faculty-dashboard.js"></script>
</body>
</html>
